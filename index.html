<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flix Filmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tela de abertura estilo Netflix -->
    <div class="tela-abertura" id="telaAbertura">
        <div class="logo-abertura">FLIX FILMES</div>
    </div>

    <header>
        <h1>🎬 Flix Filmes</h1>
        <div class="busca">
            <input type="text" id="pesquisa" placeholder="Buscar filme...">
            <button onclick="buscarFilme()">Pesquisar</button>
        </div>
    </header>

    <main id="lista-filmes"></main>

    <footer>
        <p>Dados fornecidos por <a href="https://www.themoviedb.org" target="_blank">TMDB</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
